# ============================================================
# OpenWorker — Egress Proxy (Layer 3: network allowlist)
# ============================================================
# Worker containers have no direct internet. All outbound traffic
# goes through this Squid proxy, which only permits HTTPS CONNECT
# to the allowlisted domains below. Everything else is denied and
# logged.
#
# Workers reach it via:  HTTPS_PROXY=http://openworker-proxy:3128
#
# To grant a worker a new external service, add its domain here —
# deliberately, one line per service. Deny-by-default (design
# principle #1).
# ============================================================

http_port 3128

# ── Allowlisted destinations ─────────────────────────────
# LLM providers
acl allowed_domains dstdomain api.anthropic.com
acl allowed_domains dstdomain api.openai.com

# Approval / notification channels
acl allowed_domains dstdomain slack.com
acl allowed_domains dstdomain hooks.slack.com

# Database (Supabase project domains)
acl allowed_domains dstdomain .supabase.co

# Tool integrations — uncomment per worker needs
# acl allowed_domains dstdomain api.hubapi.com          # HubSpot (Maya)
# acl allowed_domains dstdomain api.linkedin.com        # LinkedIn (Maya)
# acl allowed_domains dstdomain api.deepgram.com        # STT (Layla, Phase 3)
# acl allowed_domains dstdomain api.elevenlabs.io       # TTS (Layla, Phase 3)

# ── Protocol constraints ─────────────────────────────────
acl SSL_ports port 443
acl CONNECT method CONNECT

# CONNECT is only valid to port 443
http_access deny CONNECT !SSL_ports

# Only allowlisted domains, nothing else
http_access allow CONNECT allowed_domains
http_access allow allowed_domains
http_access deny all

# ── No caching — this is a gate, not a cache ─────────────
cache deny all
cache_mem 0 MB
maximum_object_size 0 KB

# ── Logging (denied requests are the interesting ones) ───
access_log stdio:/var/log/squid/access.log squid
logfile_rotate 0

# Don't reveal internal hostnames in error pages
visible_hostname openworker-proxy
httpd_suppress_version_string on

# Fail fast — workers shouldn't wait long on blocked egress
connect_timeout 10 seconds
request_timeout 30 seconds
